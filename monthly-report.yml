name: Run Monthly Telemetry Analysis Report

on:
  schedule:
    # Trigger automatically at 00:00 UTC (05:30 AM IST) on the 1st day of every month
    - cron: '0 0 1 * *'
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Run Monthly Telemetry Report
        run: node scripts/monthly-analysis.js
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK }}
